name: Configure Netlify DNS

on:
  workflow_dispatch:

jobs:
  configure-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure 624voice.com DNS on Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: bash scripts/configure-netlify-dns.sh

      - name: Verify domain
        run: bash scripts/verify-domain.sh
